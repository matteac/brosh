<!DOCTYPE html>
<html>

<head>
  <title class="title"></title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <dialog id="editor">
    <form id="editor-form" method="dialog">
      <textarea id="editor-text" autofocus></textarea>
      <div id="editor-buttons">
        <button class="editor-button" id="save-file">Save</button>
        <button class="editor-button">Close</button>
      </div>
    </form>
  </dialog>
  <div class="terminal">
    <div class="output"></div>
    <div class="input-container">
      <span class="prompt active-prompt"></span>
      <input class="input" type="text" autofocus />
    </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
